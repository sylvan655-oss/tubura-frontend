        </div>
        <div style={{background:'linear-gradient(135deg,#0F2A1C,#163A26)',borderRadius:'var(--r)',padding:'18px 20px',marginBottom:'20px',textAlign:'center',position:'relative',overflow:'hidden',border:'1px solid rgba(76,175,120,.16)'}}>
          <div style={{position:'absolute',top:'-30px',right:'-30px',opacity:'.08'}} className="flt"><IC n="sprout" size={80} color="white"/></div>
          <div style={{display:'flex',justifyContent:'center',marginBottom:'6px',position:'relative',zIndex:1}}><IC n="sprout" size={28} color="#7DD9A4"/></div>
          <div style={{fontSize:'14px',fontWeight:'700',color:'white',marginBottom:'2px',position:'relative',zIndex:1,fontFamily:'Fraunces,serif'}}>Powered by One Acre Fund</div>

        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          <button className="btn bn bw" style={{borderRadius:'14px'}} onClick={()=>{setUser(null);setScreen('auth');}}>{t.signOut}</button>
          <button className="btn bd bw" style={{borderRadius:'14px'}} onClick={()=>setShowDelete(true)}>{t.deleteAccount}</button>
        </div>
      </div>
      {showAddresses && <AddressManager onClose={()=>setShowAddresses(false)}/>}
      {showNotifs && <NotificationPanel onClose={()=>setShowNotifs(false)} onOpenOrder={()=>goTo&&goTo(4)}/>}
      {showHelp && <GetHelpModal onClose={()=>setShowHelp(false)}/>}
      {showPrivacy && (
        <InfoModal onClose={()=>setShowPrivacy(false)} title={t.privacyTitle} body={t.privacyBody} icon="shield"/>
      )}
      {showTerms && (
        <InfoModal onClose={()=>setShowTerms(false)} title={t.termsTitle} body={t.termsBody} icon="file-text"/>
      )}
      {showDelete && (
        <DeleteAccountModal onClose={()=>setShowDelete(false)} onDeleted={()=>{setShowDelete(false);setUser(null);setScreen('auth');}}/>
      )}
    </div>
  );
}

// ── GET HELP MODAL ─────────────────────────────────────────────────────────
function GetHelpModal({onClose}) {
  const {user,showToast} = useApp();
  const t = useLang();
  const [email,setEmail] = useState('');
  const [message,setMessage] = useState('');
  const [sending,setSending] = useState(false);
  const SUPPORT_PHONE = '+250 788 100 200';
  const SUPPORT_EMAIL = 'support@tubura.rw';

  const handleSubmit = async () => {
    if (!email.trim() || !message.trim()) { showToast(t.helpFillRequired); return; }
    setSending(true);
    try { await api.post('/api/support-requests', {phone:user?user.phone:'', email, message}); } catch(_) {}
    setSending(false);
    showToast(t.helpSent);
    setEmail(''); setMessage('');
    onClose();
  };

  return (
    <div className="mbd" onClick={onClose}>
      <div className="msh" onClick={e=>e.stopPropagation()}>
        <div className="mhd"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
          <div style={{fontFamily:'Fraunces,serif',fontSize:'22px',fontWeight:'700',color:'var(--ink)'}}>{t.getHelpTitle}</div>
          <button onClick={onClose} style={{width:'32px',height:'32px',borderRadius:'50%',background:'var(--cr2)',display:'flex',alignItems:'center',justifyContent:'center'}}><IC n="x" size={16} color="var(--ink3)"/></button>
        </div>
        <p style={{fontSize:'13px',color:'var(--ink3)',marginBottom:'18px',lineHeight:'1.6'}}>{t.getHelpIntro}</p>
        <div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'20px'}}>
          <a href={'tel:'+SUPPORT_PHONE.replace(/\s/g,'')} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 14px',background:'var(--cr2)',borderRadius:'14px',textDecoration:'none'}}>
            <div style={{width:'38px',height:'38px',borderRadius:'11px',background:'rgba(76,175,120,.14)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}}><IC n="phone" size={16} color="var(--f3)"/></div>
            <div>
              <div style={{fontSize:'10px',color:'var(--ink4)',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.06em'}}>{t.helpPhoneLabel}</div>
              <div style={{fontSize:'14px',fontWeight:'600',color:'var(--ink)'}}>{SUPPORT_PHONE}</div>
            </div>
          </a>
          <a href={'mailto:'+SUPPORT_EMAIL} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 14px',background:'var(--cr2)',borderRadius:'14px',textDecoration:'none'}}>
            <div style={{width:'38px',height:'38px',borderRadius:'11px',background:'rgba(76,175,120,.14)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}}><IC n="mail" size={16} color="var(--f3)"/></div>
            <div>
              <div style={{fontSize:'10px',color:'var(--ink4)',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.06em'}}>{t.helpEmailLabel}</div>
              <div style={{fontSize:'14px',fontWeight:'600',color:'var(--ink)'}}>{SUPPORT_EMAIL}</div>
            </div>
          </a>
        </div>
        <div className="dv"/>
        <div className="ig"><label>{t.helpYourEmail} *</label><input type="email" placeholder={t.helpYourEmailPlaceholder} value={email} onChange={e=>setEmail(e.target.value)}/></div>
        <div className="ig"><label>{t.helpMessage} *</label><textarea placeholder={t.helpMessagePlaceholder} value={message} onChange={e=>setMessage(e.target.value)} rows={4} style={{padding:'14px 18px',border:'1.5px solid var(--cr3)',borderRadius:'var(--rs)',fontSize:'15px',background:'var(--wh)',color:'var(--ink)',width:'100%',resize:'vertical',fontFamily:'Outfit,sans-serif'}}/></div>
        <button className="btn bp bw" style={{borderRadius:'14px',marginTop:'4px',gap:'8px'}} onClick={handleSubmit} disabled={sending}>
          {sending ? <span className="spin"/> : <><IC n="send" size={16} color="white"/> {t.helpSubmit}</>}
        </button>
      </div>
    </div>
  );
}

// ── DELETE ACCOUNT MODAL ───────────────────────────────────────────────────
function DeleteAccountModal({onClose, onDeleted}) {
  const {user,showToast} = useApp();
  const t = useLang();
  const [deleting,setDeleting] = useState(false);
  const handleDelete = async () => {
    setDeleting(true);
    try { await api.delete('/api/users/'+encodeURIComponent(user?user.phone:'')); } catch(_) {}
    setDeleting(false);
    showToast(t.deleteAccountDone);
    onDeleted();
  };
  return (
    <div className="mbd" onClick={onClose}>
      <div className="msh" onClick={e=>e.stopPropagation()}>
        <div className="mhd"/>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',marginBottom:'18px'}}>
          <div style={{width:'64px',height:'64px',borderRadius:'50%',background:'var(--redl)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'14px'}}>
            <IC n="trash" size={26} color="var(--red)"/>
          </div>
          <div style={{fontFamily:'Fraunces,serif',fontSize:'20px',fontWeight:'700',color:'var(--ink)',marginBottom:'8px'}}>{t.deleteAccountTitle}</div>
          <p style={{fontSize:'13px',color:'var(--ink3)',lineHeight:'1.6'}}>{t.deleteAccountBody}</p>
        </div>
        <button className="btn bd bw" style={{borderRadius:'14px',marginBottom:'8px'}} onClick={handleDelete} disabled={deleting}>
          {deleting ? <span className="spin"/> : t.deleteAccountConfirm}
        </button>
        <button className="btn bn bw" style={{borderRadius:'14px'}} onClick={onClose}>{t.cancel}</button>
      </div>
    </div>
  );
}

// ── ADDRESS MANAGER (Saved Delivery Locations) ───────────────────────────────
const ADDR_TYPES = [
  {id:'home',  icon:'home',     labelKey:'locHome'},
  {id:'farm',  icon:'sprout',   labelKey:'locFarm'},
  {id:'work',  icon:'briefcase',labelKey:'locWork'},
  {id:'other', icon:'pin',      labelKey:'locOther'},
];
function AddressManager({onClose, onSelect, selectMode}) {
  const {savedLocations,addLocation,updateLocation,deleteLocation,setDefaultLocation,showToast} = useApp();
  const t = useLang();
  const [editing,setEditing] = useState(null); // null = list view, {} = new, {...loc} = edit existing
  const [confirmDelete,setConfirmDelete] = useState(null);
  const [name,setName] = useState('');
  const [type,setType] = useState('home');
  const [province,setProvince] = useState('');
  const [district,setDistrict] = useState('');
  const [sector,setSector] = useState('');
  const [cell,setCell] = useState('');
  const [village,setVillage] = useState('');

  const startNew = () => {
    setEditing({}); setName(''); setType('home'); setProvince(''); setDistrict(''); setSector(''); setCell(''); setVillage('');
  };
  const startEdit = (loc) => {
    setEditing(loc); setName(loc.name||''); setType(loc.icon&&ADDR_TYPES.find(a=>a.icon===loc.icon)?ADDR_TYPES.find(a=>a.icon===loc.icon).id:'other');
    const inferredProvince = loc.province || findProvinceForDistrict(loc.district||'');
    setProvince(inferredProvince); setDistrict(loc.district||''); setSector(loc.sector||''); setCell(loc.cell||''); setVillage(loc.village||'');
  };
  const handleSave = () => {
    if (!name.trim() || !district) { showToast(t.fillRequired); return; }
    const iconForType = (ADDR_TYPES.find(a=>a.id===type)||ADDR_TYPES[3]).icon;
    const payload = {name:name.trim(), icon:iconForType, province, district, sector, cell, village};
    if (editing && editing.id) {
      updateLocation(editing.id, payload);
      showToast(t.save+' ✓');
      setEditing(null);
    } else {
      const created = addLocation(payload);
      showToast(t.save+' ✓');
      if (selectMode) { onSelect(Object.assign({},created,payload)); onClose(); }
      else setEditing(null);
    }
  };
  const handleDelete = (id) => { deleteLocation(id); setConfirmDelete(null); showToast(t.deleteAddress+' ✓'); };

  return (
    <div className="mbd" onClick={onClose}>
      <div className="msh" onClick={e=>e.stopPropagation()}>
        <div className="mhd"/>
        {!editing ? (
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
              <div style={{fontFamily:'Fraunces,serif',fontSize:'22px',fontWeight:'700',color:'var(--ink)'}}>{selectMode?t.confirmDeliveryLocation:t.savedAddresses}</div>
              <button onClick={onClose} style={{width:'32px',height:'32px',borderRadius:'50%',background:'var(--cr2)',display:'flex',alignItems:'center',justifyContent:'center'}}><IC n="x" size={16} color="var(--ink3)"/></button>
            </div>
            <div style={{fontSize:'13px',color:'var(--ink3)',marginBottom:'20px'}}>{selectMode?t.useExisting:t.savedAddressesSub}</div>
            {savedLocations.length===0 ? (
              <div style={{textAlign:'center',padding:'32px 16px'}}>
                <div style={{display:'flex',justifyContent:'center',marginBottom:'12px',opacity:'.5'}}><IC n="pin" size={48} color="var(--ink4)"/></div>
                <div style={{fontSize:'15px',fontWeight:'700',color:'var(--ink)',marginBottom:'4px'}}>{t.noSavedAddresses}</div>
                <div style={{fontSize:'13px',color:'var(--ink3)'}}>{selectMode?t.noAddressYet:t.noSavedAddressesSub}</div>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'16px'}}>
                {savedLocations.map(loc=>{
                  const typeInfo = ADDR_TYPES.find(a=>a.icon===loc.icon) || ADDR_TYPES[3];
                  return (
                    <div key={loc.id} onClick={selectMode?()=>{onSelect(loc);onClose();}:undefined} style={{border:'1.5px solid',borderColor:loc.default?'var(--f3)':'var(--cr3)',borderRadius:'var(--r)',padding:'14px 16px',background:loc.default?'rgba(76,175,120,.08)':'var(--cr2)',cursor:selectMode?'pointer':'default'}}>
                      <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
                        <div style={{width:'40px',height:'40px',borderRadius:'12px',background:'rgba(76,175,120,.14)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}}>
                          <IC n={loc.icon||'pin'} size={18} color="var(--f3)"/>
                        </div>
                        <div style={{flex:'1',minWidth:'0'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'2px'}}>
                            <span style={{fontWeight:'700',fontSize:'14px',color:'var(--ink)'}}>{loc.name}</span>
                            {loc.default && <span className="badge bgg" style={{padding:'2px 8px'}}>{t.defaultBadge}</span>}
                          </div>
                          <div style={{fontSize:'12px',color:'var(--ink3)',lineHeight:'1.5'}}>
                            {[loc.village,loc.cell,loc.sector,loc.district].filter(Boolean).join(', ')}
                          </div>
                        </div>
                        {selectMode && <IC n="arrow" size={16} color="var(--ink5)"/>}
                      </div>
                      {!selectMode && (
                        <div style={{display:'flex',gap:'8px',marginTop:'12px'}}>
                          {!loc.default && <button onClick={()=>setDefaultLocation(loc.id)} style={{flex:'1',padding:'8px',fontSize:'12px',fontWeight:'600',color:'var(--f3)',background:'rgba(76,175,120,.10)',borderRadius:'10px',textAlign:'center'}}>{t.setAsDefault}</button>}
                          <button onClick={()=>startEdit(loc)} style={{flex:'1',padding:'8px',fontSize:'12px',fontWeight:'600',color:'var(--ink2)',background:'var(--cr3)',borderRadius:'10px',textAlign:'center'}}>{t.editAddress}</button>
                          <button onClick={()=>setConfirmDelete(loc.id)} style={{padding:'8px 12px',fontSize:'12px',fontWeight:'600',color:'var(--red)',background:'var(--redl)',borderRadius:'10px'}}><IC n="x" size={14} color="var(--red)" sw={2.5}/></button>
                        </div>
                      )}
                      {!selectMode && confirmDelete===loc.id && (
                        <div style={{marginTop:'10px',padding:'12px',background:'var(--redl)',borderRadius:'12px',border:'1px solid rgba(224,88,79,.3)'}}>
                          <div style={{fontSize:'13px',fontWeight:'700',color:'var(--ink)',marginBottom:'2px'}}>{t.deleteConfirm}</div>
                          <div style={{fontSize:'12px',color:'var(--ink3)',marginBottom:'10px'}}>{t.deleteConfirmSub}</div>
                          <div style={{display:'flex',gap:'8px'}}>
                            <button onClick={()=>setConfirmDelete(null)} style={{flex:'1',padding:'8px',fontSize:'12px',fontWeight:'700',color:'var(--ink2)',background:'var(--cr3)',borderRadius:'10px'}}>{t.cancel}</button>
                            <button onClick={()=>handleDelete(loc.id)} style={{flex:'1',padding:'8px',fontSize:'12px',fontWeight:'700',color:'white',background:'var(--red)',borderRadius:'10px'}}>{t.deleteAddress}</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
            <button className="btn bs bw" style={{borderRadius:'14px'}} onClick={startNew}>+ {selectMode?t.addNewLocation:t.addNewAddress}</button>
          </>
        ) : (
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
              <div style={{fontFamily:'Fraunces,serif',fontSize:'20px',fontWeight:'700',color:'var(--ink)'}}>{editing.id?t.editAddress:t.addAddress}</div>
              <button onClick={()=>setEditing(null)} style={{width:'32px',height:'32px',borderRadius:'50%',background:'var(--cr2)',display:'flex',alignItems:'center',justifyContent:'center'}}><IC n="x" size={16} color="var(--ink3)"/></button>
            </div>
            <div className="ig"><label>{t.addressName} *</label><input placeholder={t.addressNamePlaceholder} value={name} onChange={e=>setName(e.target.value)}/></div>
            <div className="ig"><label>{t.addressType}</label>
              <div style={{display:'flex',gap:'8px'}}>
                {ADDR_TYPES.map(at=>(
                  <button key={at.id} type="button" className={'chip'+(type===at.id?' on':'')} style={{flex:'1',justifyContent:'center',gap:'6px'}} onClick={()=>setType(at.id)}>
                    <IC n={at.icon} size={14} color={type===at.id?'white':'var(--f3)'}/> {t[at.labelKey]}
                  </button>
                ))}
              </div>
            </div>
            <div className="ig"><label>{t.provinceLabel} *</label>
              <select value={province} onChange={e=>{setProvince(e.target.value);setDistrict('');setSector('');setCell('');setVillage('');}}>
                <option value="">{t.selectProvince}</option>
                {PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>
            <div className="ig"><label>{t.districtLabel} *</label>
              <select value={district} disabled={!province} onChange={e=>{setDistrict(e.target.value);setSector('');setCell('');setVillage('');}}>
                <option value="">{t.selectDistrict}</option>
                {getDistrictsOf(province).map(d => <option key={d} value={d}>{d}</option>)}
              </select>
            </div>
            <div className="ig"><label>{t.sectorLabel}</label>
              <select value={sector} disabled={!district} onChange={e=>{setSector(e.target.value);setCell('');setVillage('');}}>
                <option value="">{t.selectSector}</option>
                {getSectorsOf(province,district).map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div className="ig"><label>{t.cellLabel}</label>
              <select value={cell} disabled={!sector} onChange={e=>{setCell(e.target.value);setVillage('');}}>
                <option value="">{t.selectCell}</option>
                {getCellsOf(province,district,sector).map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="ig"><label>{t.villageLabel}</label>
              <select value={village} disabled={!cell} onChange={e=>setVillage(e.target.value)}>
                <option value="">{t.selectVillage}</option>
                {getVillagesOf(province,district,sector,cell).map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            </div>
            <button className="btn bp bw" style={{borderRadius:'14px',marginTop:'4px'}} onClick={handleSave}>{t.save}</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── NOTIFICATIONS ──────────────────────────────────────────────────────────
const NOTIF_CATS = {
  order:    {icon:'orders', color:'#4CAF78'},
  delivery: {icon:'truck',  color:'#6FA8E0'},
  promo:    {icon:'tag',    color:'#E3B341'},
  feedback: {icon:'star',   color:'#F0C868'},
};
function NotificationPanel({onClose, onOpenOrder}) {
  const {notifications,unreadCount,markRead,markAllRead} = useApp();
  const t = useLang();

  const formatTime = (iso) => {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('en-RW',{day:'numeric',month:'short'}) + ' · ' + d.toLocaleTimeString('en-RW',{hour:'2-digit',minute:'2-digit'});
    } catch(_) { return ''; }
  };

  const handleTap = (n) => {
    if (!n.read) markRead(n.id);
    if (n.category==='order' && n.order_id && onOpenOrder) { onOpenOrder(n.order_id); onClose(); }
  };

  return (
    <div className="mbd" onClick={onClose}>
      <div className="msh" onClick={e=>e.stopPropagation()}>
        <div className="mhd"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
          <div style={{fontFamily:'Fraunces,serif',fontSize:'22px',fontWeight:'700',color:'var(--ink)'}}>{t.notificationsTitle}</div>
          <button onClick={onClose} style={{width:'32px',height:'32px',borderRadius:'50%',background:'var(--cr2)',display:'flex',alignItems:'center',justifyContent:'center'}}><IC n="x" size={16} color="var(--ink3)"/></button>
        </div>
        {unreadCount > 0 && (
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
            <span style={{fontSize:'13px',color:'var(--ink3)'}}>{unreadCount} {unreadCount!==1?t.notifPlural:t.notifSingular}</span>
            <button onClick={markAllRead} style={{fontSize:'13px',fontWeight:'600',color:'var(--f3)'}}>{t.notifMarkAllRead}</button>
          </div>
        )}
        {notifications.length===0 ? (
          <div style={{textAlign:'center',padding:'40px 16px'}}>
            <div style={{width:'72px',height:'72px',borderRadius:'50%',background:'rgba(76,175,120,.10)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
              <IC n="bell" size={30} color="var(--f3)"/>
            </div>
            <div style={{fontSize:'15px',fontWeight:'700',color:'var(--ink)',marginBottom:'4px'}}>{t.notifEmpty}</div>
            <div style={{fontSize:'13px',color:'var(--ink3)',lineHeight:'1.5'}}>{t.notifEmptySub}</div>
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'8px'}}>
            {notifications.map(n=>{
              const cat = NOTIF_CATS[n.category] || NOTIF_CATS.order;
              return (
                <div key={n.id} onClick={()=>handleTap(n)} style={{border:'1.5px solid',borderColor:n.read?'var(--cr3)':cat.color+'55',borderRadius:'var(--r)',padding:'14px 16px',background:n.read?'var(--cr2)':cat.color+'14',cursor:'pointer',position:'relative'}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
                    <div style={{width:'40px',height:'40px',borderRadius:'12px',background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}}>
                      <IC n={cat.icon} size={18} color={cat.color}/>
                    </div>
                    <div style={{flex:'1',minWidth:'0'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'2px'}}>
                        <span style={{fontWeight:'700',fontSize:'14px',color:'var(--ink)'}}>{n.title}</span>
                        {!n.read && <span style={{width:'7px',height:'7px',borderRadius:'50%',background:cat.color,flexShrink:'0'}}/>}
                      </div>
                      <div style={{fontSize:'13px',color:'var(--ink3)',lineHeight:'1.4',marginBottom:'4px'}}>{n.body}</div>
                      <div style={{fontSize:'11px',color:'var(--ink4)',fontWeight:'500'}}>{formatTime(n.createdAt)}</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN ───────────────────────────────────────────────────────────────────
function Main() {
  const {cartCount} = useApp();
  const t = useLang();
  const [tab,setTab] = useState(0);
  const tabs = [
    {icon:'home',  label:t.home||'Home',     comp:<Home goTo={setTab}/>},
    {icon:'shop',  label:t.shop||'Shop',    comp:<Shop/>},
    {icon:'pin',   label:t.retailers||'Retailers', comp:<Retailers/>},
    {icon:'cart',  label:t.cartItems||'Cart', comp:<Cart goTo={setTab}/>},
    {icon:'orders',label:t.orders||'Orders',comp:<Orders/>},
    {icon:'training',label:t.training||'Training',comp:<Training/>},
    {icon:'profile',label:t.profile||'Profile', comp:<Profile goTo={setTab}/>},
  ];
  const nav = [0,1,2,3,4,6];
  return (
    <>
      <div style={{flex:'1',overflow:'auto',position:'relative',display:'flex',flexDirection:'column'}}>{tabs[tab].comp}</div>
      <div className="bnav">
        {nav.map(i=>{
          const item=tabs[i], isCart=item.icon==='cart', on=tab===i;
          return (
            <button key={i} className={'ni'+(on?' on':'')} onClick={()=>setTab(i)}>
              <div className="ni-pip"/>
              <div style={{position:'relative',marginTop:'2px'}}>
                <IC n={item.icon} size={22} color={on?'#4CAF78':'rgba(255,255,255,.35)'} sw={on?2:1.6}/>
                {isCart && cartCount>0 && <div className="cbadge">{cartCount>9?'9+':cartCount}</div>}
              </div>
              <span>{item.label}</span>
            </button>
          );
        })}
      </div>
    </>
  );
}

// ── TOAST + APP ────────────────────────────────────────────────────────────
function Toast() {
  const {toast} = useApp();
  if (!toast) return null;
  return <div className="toast">{toast}</div>;
}

function App() {
  const {screen} = useApp();
  return (
    <div className="shell">
      {screen==='lang'    && <LangPicker/>}
      {screen==='splash'  && <Splash/>}
      {screen==='auth'    && <Auth/>}
      {screen==='main'    && <Main/>}
      <Toast/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App/></AppProvider>
);
</script>
</body>
</html>
